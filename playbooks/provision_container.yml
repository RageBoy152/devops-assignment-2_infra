- name: Stage 1 - Launch EC2 Instance
  hosts: localhost
  connection: local
  # variables to be used in the playbook - making it easier to change values
  vars:
    instance_name: DevOpsAssignment2_Prod
    key_name: devops-assignment-2-prod-key
    instance_type: t2.small
    security_group: devops-assignment-2-prod-sg
    image_id: ami-0866a3c8686eaeeba
    region: us-east-1
    pem_path: "{{ playbook_dir }}/devops-assignment-2-prod-key.pem"
    ansible_ssh_private_key_file: "{{ pem_path }}"

  tasks:
    - name: Terminate existing instance with the same name before relaunch
      ec2_instance:
        region: "{{ region }}"
        filters:
          "tag:Name": "{{ instance_name }}"
          instance-state-name:
            - pending
            - running
            - stopping
            - stopped
        state: absent
        wait: yes

    - name: Launch T2 small instance on EC2
      ec2_instance:
        name: "{{ instance_name }}"
        key_name: "{{ key_name }}"
        instance_type: "{{ instance_type }}"
        security_group: "{{ security_group }}"
        image_id: "{{ image_id }}"
        region: "{{ region }}"
        state: started
        wait: yes
      register: DevOpsAssignment2_Prod_Instance

    - name: Add new instance to host group via its public IP address
      add_host:
        hostname: "{{ DevOpsAssignment2_Prod_Instance.instances[0].public_ip_address }}"
        groupname: ec2_staging
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no'

    - name: Wait for SSH to come up
      wait_for:
        host: "{{ DevOpsAssignment2_Prod_Instance.instances[0].public_ip_address }}"
        port: 22
        delay: 20
        timeout: 320
        state: started

- name: Stage 2 - Install Docker on the EC2 Instance
  hosts: ec2_staging
  vars:
    pem_path: "{{ playbook_dir }}/devops-assignment-2-prod-key.pem"
    ansible_ssh_private_key_file: "{{ pem_path }}"
    remote_ec2_user: ubuntu
  remote_user: "{{ remote_ec2_user }}"
  become: true
  become_method: sudo

  tasks:
    - name: Add the Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker Repository
      apt_repository:
        repo: deb https://download.docker.com/linux/ubuntu jammy stable
        state: present

    - name: Update apt packages and install docker-ce
      apt:
        name: docker-ce
        state: present
        update_cache: true

    - name: Ensure Docker service is running
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add user to docker group
      user:
        name: "{{ remote_ec2_user }}"
        groups: docker
        append: yes

- name: Stage 3 - Verify public IP resolution from Localhost
  hosts: localhost
  connection: local

  tasks:
    - name: Get the EC2 IP from the previous stage
      set_fact:
        ec2_ip: "{{ DevOpsAssignment2_Prod_Instance.instances[0].public_ip_address }}"

    - name: Wait for HTTP 200 on the EC2 public IP
      ansible.builtin.uri:
        url: "http://{{ ec2_ip }}"
        return_content: true
        status_code: 200
      register: app_check
      until: app_check.status == 200
      retries: 10
      delay: 10

    - name: Final Result
      debug:
        msg: "Success! The application is now live at http://{{ ec2_ip }}"
